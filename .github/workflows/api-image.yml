name: Build API Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "**"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: poneglyph-one-optcg-api
  ECS_CLUSTER: poneglyph-one-cluster
  ECS_SERVICE: poneglyph-one-api
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
        run: |
          docker build -t "$IMAGE_URI:sha-${GITHUB_SHA}" .
          docker push "$IMAGE_URI:sha-${GITHUB_SHA}"

          if [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "master" ]; then
            docker tag "$IMAGE_URI:sha-${GITHUB_SHA}" "$IMAGE_URI:latest"
            docker push "$IMAGE_URI:latest"
          fi

      - name: Summarize image tag
        env:
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
        run: |
          echo "Pushed $IMAGE_URI:sha-${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy API service
        if: github.ref_name == 'main' || github.ref_name == 'master'
        run: |
          aws ecs update-service \
            --region "$AWS_REGION" \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment

          aws ecs wait services-stable \
            --region "$AWS_REGION" \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

          echo "Rolled out $ECS_SERVICE on $ECS_CLUSTER" >> "$GITHUB_STEP_SUMMARY"
